# Nginx reverse proxy with oauth2-proxy auth_request
# Routes:
#   /      -> Toolbox (host: 3001)
#   /api   -> Next.js app (host: 3002)
# Both protected by oauth2-proxy (GitHub).

worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

  access_log  /var/log/nginx/access.log  main;

  sendfile        on;
  keepalive_timeout  65;

  # Upstreams to host services
  upstream toolbox {
    server host.docker.internal:3001;
  }
  upstream app_api {
    server host.docker.internal:3002;
  }
  upstream oauth2_proxy_upstream {
    server oauth2-proxy:4180;
  }

  server {
    listen 80;
    server_name _;

    # Allow larger bodies if needed
    client_max_body_size 20m;

    # OAuth2 Proxy endpoints
    location /oauth2/ {
      proxy_pass       http://oauth2_proxy_upstream;
      proxy_set_header Host                $host;
      proxy_set_header X-Real-IP           $remote_addr;
      proxy_set_header X-Scheme            $scheme;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Auth verification endpoint
    location = /oauth2/auth {
      proxy_pass       http://oauth2_proxy_upstream;
      proxy_set_header Host                $host;
      proxy_set_header X-Real-IP           $remote_addr;
      proxy_set_header X-Scheme            $scheme;
      proxy_set_header Content-Length      "";
      proxy_pass_request_body off;
    }

    # Helper: set headers after successful auth_request
    auth_request_set $auth_user $upstream_http_x_auth_request_user;
    auth_request_set $auth_email $upstream_http_x_auth_request_email;
    auth_request_set $auth_preferred_username $upstream_http_x_auth_request_preferred_username;

    # Public: Stripe webhook must not require auth (Stripe cannot sign in)
    location = /api/webhooks/stripe {
      proxy_set_header X-Forwarded-Proto    $scheme;
      proxy_set_header X-Forwarded-Host     $host;
      proxy_set_header X-Forwarded-Uri      $request_uri;
      proxy_set_header Host                 $host;
      proxy_pass http://app_api;
    }

    # API
    location /api/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;

      proxy_set_header X-Auth-Request-User  $auth_user;
      proxy_set_header X-Auth-Request-Email $auth_email;
      proxy_set_header X-Forwarded-User     $auth_preferred_username;
      proxy_set_header X-Forwarded-Proto    $scheme;
      proxy_set_header X-Forwarded-Host     $host;
      proxy_set_header X-Forwarded-Uri      $request_uri;
      proxy_set_header Host                 $host;

      # SSE-friendly settings to avoid buffering/timeouts
      proxy_http_version 1.1;
      proxy_set_header Connection "keep-alive";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      add_header X-Accel-Buffering no;

      proxy_pass http://app_api;
    }

    # Toolbox (everything else)
    location / {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;

      proxy_set_header X-Auth-Request-User  $auth_user;
      proxy_set_header X-Auth-Request-Email $auth_email;
      proxy_set_header X-Forwarded-User     $auth_preferred_username;
      proxy_set_header X-Forwarded-Proto    $scheme;
      proxy_set_header X-Forwarded-Host     $host;
      proxy_set_header X-Forwarded-Uri      $request_uri;
      proxy_set_header Host                 $host;

      proxy_pass http://toolbox;
    }
  }
}
